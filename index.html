<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lab Finder – LabCorp & Quest Diagnostics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;
  --surface:#ffffff;
  --border:#e4e7ed;
  --border2:#d0d5df;
  --labcorp:#d63031;
  --quest:#0984e3;
  --crl:#6c3fc5;
  --text:#1a1d23;
  --muted:#6b7280;
  --light:#f0f2f6;
  --accent:#2d3a8c;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius:10px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh}
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;height:58px;display:flex;align-items:center;gap:16px;
  flex-shrink:0;box-shadow:0 1px 0 var(--border);z-index:10;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#4f5bd5);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-weight:700;font-size:1.05rem;color:var(--text);letter-spacing:-.02em}
.logo-text span{color:var(--accent)}

.search-wrap{
  flex:1;max-width:460px;position:relative;display:flex;align-items:center;gap:8px;
}
.search-box{
  flex:1;height:36px;border:1.5px solid var(--border2);border-radius:8px;
  padding:0 12px 0 36px;font-size:.88rem;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,58,140,.1)}
.search-box::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:10px;color:var(--muted);pointer-events:none}
.search-btn{
  height:36px;padding:0 16px;border-radius:8px;background:var(--accent);color:#fff;
  border:none;font-size:.83rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  white-space:nowrap;transition:opacity .15s;
}
.search-btn:hover{opacity:.88}
.search-clear{
  height:36px;padding:0 12px;border-radius:8px;background:none;border:1.5px solid var(--border2);
  color:var(--muted);font-size:.83rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
  display:none;
}
.search-clear.visible{display:block}
.search-clear:hover{color:var(--text);border-color:var(--border2)}

.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.filter-btn{
  height:34px;padding:0 14px;border-radius:20px;border:1.5px solid var(--border2);
  background:transparent;color:var(--muted);font-size:.8rem;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.filter-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filter-btn.active-all{background:rgba(45,58,140,.08);border-color:var(--accent);color:var(--accent)}
.filter-btn.active-lc{background:rgba(214,48,49,.08);border-color:var(--labcorp);color:var(--labcorp)}
.filter-btn.active-qd{background:rgba(9,132,227,.08);border-color:var(--quest);color:var(--quest)}
.filter-btn.active-crl{background:rgba(108,63,197,.08);border-color:var(--crl);color:var(--crl)}

.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:360px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--surface);border-right:1px solid var(--border);overflow:hidden;
}
.sidebar-head{
  padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-title{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.sidebar-count{font-size:1.1rem;font-weight:700;color:var(--text)}
.sidebar-count span{color:var(--muted);font-weight:400;font-size:.85rem}
.radius-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.radius-label{font-size:.72rem;color:var(--muted)}
.radius-chip{
  height:26px;padding:0 10px;border-radius:13px;border:1.5px solid var(--border2);
  background:transparent;color:var(--muted);font-size:.75rem;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.radius-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

.list{flex:1;overflow-y:auto;padding:8px}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.card{
  border-radius:var(--radius);border:1.5px solid var(--border);padding:12px 14px;
  margin-bottom:6px;cursor:pointer;transition:all .18s;background:var(--surface);
  display:flex;gap:12px;align-items:flex-start;
}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,58,140,.1)}
.card-badge{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:.65rem;font-weight:700;
  font-family:'DM Mono',monospace;letter-spacing:.02em;
}
.card-badge.labcorp{background:rgba(214,48,49,.1);color:var(--labcorp)}
.card-badge.quest{background:rgba(9,132,227,.1);color:var(--quest)}
.card-badge.crl{background:rgba(108,63,197,.1);color:var(--crl)}
.card-info{flex:1;min-width:0}
.card-name{font-size:.88rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-addr{font-size:.76rem;color:var(--muted);line-height:1.4;margin-bottom:5px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.card-tag{
  font-size:.68rem;font-weight:500;padding:2px 7px;border-radius:10px;
  background:var(--light);color:var(--muted);
}
.card-dist{font-size:.72rem;font-weight:600;color:var(--accent)}
.card-rating{font-size:.72rem;color:#f59e0b;font-weight:600}

.no-results{padding:40px 20px;text-align:center;color:var(--muted)}
.no-results svg{width:40px;height:40px;margin:0 auto 12px;display:block;opacity:.3}
.no-results strong{display:block;color:var(--text);font-size:.95rem;margin-bottom:6px}

/* ── MAP ── */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* ── INFO WINDOW override ── */
.gm-style .gm-style-iw-c{border-radius:12px!important;padding:0!important;box-shadow:var(--shadow-lg)!important;max-width:300px!important}
.gm-style .gm-style-iw-d{overflow:hidden!important;padding:0!important}
.gm-style .gm-style-iw-tc::after{background:#fff!important}
.iw{padding:16px;font-family:'DM Sans',sans-serif;min-width:240px}
.iw-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.iw-badge{
  width:32px;height:32px;border-radius:7px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:.6rem;font-weight:700;font-family:'DM Mono',monospace;
}
.iw-badge.labcorp{background:rgba(214,48,49,.1);color:var(--labcorp)}
.iw-badge.quest{background:rgba(9,132,227,.1);color:var(--quest)}
.iw-badge.crl{background:rgba(108,63,197,.1);color:var(--crl)}
.iw-name{font-size:.9rem;font-weight:700;color:var(--text);line-height:1.3}
.iw-type{font-size:.7rem;color:var(--muted);font-weight:500;margin-top:1px}
.iw-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.iw-row{display:flex;gap:8px;align-items:flex-start;font-size:.78rem}
.iw-row-icon{flex-shrink:0;margin-top:1px;opacity:.5}
.iw-row-val{color:var(--text);line-height:1.4}
.iw-row-val a{color:var(--accent);text-decoration:none;font-weight:500}
.iw-row-val a:hover{text-decoration:underline}
.iw-actions{display:flex;gap:6px}
.iw-btn{
  flex:1;height:32px;border-radius:7px;border:none;font-size:.75rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;text-decoration:none;
  display:flex;align-items:center;justify-content:center;
}
.iw-btn-primary{background:var(--accent);color:#fff}
.iw-btn-secondary{background:var(--light);color:var(--text)}
.iw-btn:hover{opacity:.85}

/* ── MAP CONTROLS ── */
.map-legend{
  position:absolute;bottom:28px;left:16px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;
}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.75rem;font-weight:500;color:var(--text)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-dot.lc{background:var(--labcorp)}
.legend-dot.qd{background:var(--quest)}
.legend-dot.crl{background:var(--crl)}

.searching-overlay{
  position:absolute;inset:0;background:rgba(247,248,250,.6);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:5;
}
.searching-overlay.visible{display:flex}
.searching-spinner{
  background:var(--surface);border-radius:12px;padding:20px 28px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:12px;font-weight:500;font-size:.9rem;color:var(--text);
}
.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:8px 18px;border-radius:20px;
  font-size:.8rem;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;z-index:20;
}
.toast.show{opacity:1}
</style>
</head>

      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},

function getCRLNearby() {
  if (!searchCenter) return [];
  return CRL_LOCS.map(loc => {
    const pos = new google.maps.LatLng(loc.lat, loc.lng);
    const dist = google.maps.geometry.spherical.computeDistanceBetween(searchCenter, pos) / 1609.34;
    return { ...loc, dist };
  }).filter(l => l.dist <= searchRadius).sort((a, b) => a.dist - b.dist);
}

function doSearch() {
  if (!mapReady || !geocoder) {
    showToast('Map is still loading — please wait a moment');
    return;
  }
  const query = document.getElementById('search-input').value.trim();
  if (!query) { showToast('Enter a city, state, or ZIP code'); return; }

  showSearching(true);
  clearMarkers();
  allResults = [];

  const isZip = /^\d{5}$/.test(query);

  // Strategy 1: component-based geocoding (most reliable for ZIPs)
  const geocodeRequest = isZip
    ? { componentRestrictions: { postalCode: query, country: 'US' } }
    : { address: query + ', USA' };

  console.log('Geocoding with:', geocodeRequest);

  geocoder.geocode(geocodeRequest, (results, status) => {
    console.log('Geocode status:', status, results?.[0]?.formatted_address);

    if (status === 'OK' && results && results.length > 0) {
      handleGeoResult(results[0].geometry.location);
      return;
    }

    console.log('Strategy 1 failed, trying plain address...');

    // Strategy 2: plain text geocode
    geocoder.geocode({ address: query }, (r2, s2) => {
      console.log('Strategy 2:', s2, r2?.[0]?.formatted_address);

      if (s2 === 'OK' && r2 && r2.length > 0) {
        handleGeoResult(r2[0].geometry.location);
        return;
      }

      console.log('Strategy 2 failed, trying Places text search...');

      // Strategy 3: use Places textSearch as geocoder fallback
      placesService.textSearch({ query: query + ' United States' }, (r3, s3) => {
        console.log('Strategy 3 (Places):', s3, r3?.[0]?.name, r3?.[0]?.formatted_address);

        if (s3 === google.maps.places.PlacesServiceStatus.OK && r3 && r3.length > 0) {
          handleGeoResult(r3[0].geometry.location);
          return;
        }

        // All strategies failed
        showSearching(false);
        if (status === 'REQUEST_DENIED' || s2 === 'REQUEST_DENIED') {
          showToast('API key error — check Google Cloud Console');
        } else {
          showToast('Location not found. Try "New York, NY" or "Miami, FL"');
        }
      });
    });
  });
}

function handleGeoResult(loc) {
  searchCenter = loc;
  map.setCenter(loc);
  map.setZoom(11);
  document.getElementById('search-clear').classList.add('visible');
  document.getElementById('radius-row').style.display = 'flex';
  drawRadiusCircle();
  searchBothNetworks(loc);
}

function searchBothNetworks(center) {
  const networks = [];
  if (currentFilter === 'all' || currentFilter === 'labcorp') networks.push({ keyword: 'LabCorp', type: 'labcorp' });
  if (currentFilter === 'all' || currentFilter === 'quest')   networks.push({ keyword: 'Quest Diagnostics', type: 'quest' });

  if (networks.length === 0) { finishSearch(); return; }

  let done = 0;
  networks.forEach(net => {
    searchNetwork(center, net.keyword, net.type, () => {
      done++;
      if (done === networks.length) finishSearch();
    });
  });
}

function searchNetwork(center, keyword, type, callback) {
  const radiusMeters = Math.min(searchRadius * 1609.34, 50000);

  const request = {
    query: keyword,
    location: center,
    radius: radiusMeters,
  };

  placesService.textSearch(request, (results, status) => {
    console.log('textSearch', keyword, '->', status, results ? results.length + ' results' : 'none');

    if (status === google.maps.places.PlacesServiceStatus.OK && results) {
      results.forEach(place => {
        if (isRelevant(place.name, keyword)) addResult(place, type);
      });
    } else if (status === 'REQUEST_DENIED') {
      showToast('Places API denied — enable it in Google Cloud Console');
    }

    // Always fall back to nearbySearch as a second pass
    const req2 = {
      location: center,
      radius: radiusMeters,
      keyword: keyword,
    };
    placesService.nearbySearch(req2, (results2, status2) => {
      console.log('nearbySearch', keyword, '->', status2, results2 ? results2.length + ' results' : 'none');
      if (status2 === google.maps.places.PlacesServiceStatus.OK && results2) {
        results2.forEach(place => {
          if (isRelevant(place.name, keyword)) addResult(place, type);
        });
      }
      callback();
    });
  });
}

function isRelevant(name, keyword) {
  const n = (name || '').toLowerCase();
  if (keyword === 'LabCorp') return n.includes('labcorp') || n.includes('lab corp');
  if (keyword === 'Quest Diagnostics') return n.includes('quest');
  return false;
}

function addResult(place, type) {
  if (!place || !place.place_id) return;
  // Deduplicate
  if (allResults.find(r => r.place && r.place.place_id === place.place_id)) return;

  const distMiles = searchCenter && place.geometry
    ? google.maps.geometry.spherical.computeDistanceBetween(searchCenter, place.geometry.location) / 1609.34
    : null;

  const result = { place, type, dist: distMiles };
  allResults.push(result);

  const color = type === 'labcorp' ? '#d63031' : '#0984e3';
  const label = type === 'labcorp' ? 'LC' : 'QD';

  const svgMarker = {
    path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
    fillColor: color,
    fillOpacity: 1,
    strokeColor: '#ffffff',
    strokeWeight: 1.5,
    scale: 1.6,
    anchor: new google.maps.Point(12, 22),
  };

  const marker = new google.maps.Marker({
    position: place.geometry.location,
    map,
    icon: svgMarker,
    title: place.name,
    animation: google.maps.Animation.DROP,
  });

  marker.addListener('click', () => {
    openInfoWindow(marker, result);
    highlightCard(place.place_id);
  });

  allMarkers.push(marker);
}

function finishSearch() {
  // Add static LabCorp results within radius
  if (currentFilter === 'all' || currentFilter === 'labcorp') {
    LABCORP_LOCS.forEach(loc => {
      const pos = new google.maps.LatLng(loc.lat, loc.lng);
      const dist = google.maps.geometry.spherical.computeDistanceBetween(searchCenter, pos) / 1609.34;
      if (dist <= searchRadius && !allResults.find(r => r.staticData && r.staticData.addr === loc.addr)) {
        allResults.push({ type: 'labcorp', staticData: loc, dist });
      }
    });
  }
  // Add static Quest results within radius
  if (currentFilter === 'all' || currentFilter === 'quest') {
    QUEST_LOCS.forEach(loc => {
      const pos = new google.maps.LatLng(loc.lat, loc.lng);
      const dist = google.maps.geometry.spherical.computeDistanceBetween(searchCenter, pos) / 1609.34;
      if (dist <= searchRadius && !allResults.find(r => r.staticData && r.staticData.addr === loc.addr)) {
        allResults.push({ type: 'quest', staticData: loc, dist });
      }
    });
  }
  // Add CRL results within radius
  if (currentFilter === 'all' || currentFilter === 'crl') {
    const nearby = getCRLNearby();
    nearby.forEach(loc => {
      if (!allResults.find(r => r.crlData && r.crlData.addr === loc.addr)) {
        allResults.push({ type: 'crl', crlData: loc, dist: loc.dist });
      }
    });
    crlMarkersShown.forEach(({ marker, loc }) => {
      const pos = new google.maps.LatLng(loc.lat, loc.lng);
      const dist = google.maps.geometry.spherical.computeDistanceBetween(searchCenter, pos) / 1609.34;
      marker.setOpacity(dist <= searchRadius ? 1 : 0.2);
    });
  }
  showSearching(false);
  allResults.sort((a, b) => (a.dist || 999) - (b.dist || 999));
  renderSidebar();
  if (allResults.length === 0) {
    showToast('No labs found nearby — try increasing the radius');
  } else {
    showToast(`Found ${allResults.length} location${allResults.length !== 1 ? 's' : ''} nearby`);
  }
}

  document.getElementById('loc-count').innerHTML = `${allResults.length} <span>found</span>`;

  if (!allResults.length) {
    list.innerHTML = `<div class="no-results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <strong>No locations found</strong>
      Try a larger radius or a different search area.
    </div>`;
    return;
  }

  list.innerHTML = '';
  allResults.forEach(result => {
    const card = document.createElement('div');

    if (result.type === 'crl') {
      const loc = result.crlData;
      const cardId = 'crl-' + loc.lat + loc.lng;
      card.className = 'card';
      card.id = 'card-' + cardId;
      card.innerHTML = `
        <div class="card-badge crl">CRL</div>
        <div class="card-info">
          <div class="card-name">${loc.name}</div>
          <div class="card-addr">${loc.addr}</div>
          <div class="card-meta">
            <span class="card-tag" style="background:rgba(108,63,197,.08);color:var(--crl)">CRL Network</span>
            <span class="card-tag">${loc.tag}</span>
            ${result.dist ? `<span class="card-dist">📍 ${result.dist.toFixed(1)} mi</span>` : ''}
          </div>
        </div>`;
      card.addEventListener('click', () => {
        const found = crlMarkersShown.find(m => m.loc.lat === loc.lat && m.loc.lng === loc.lng);
        if (found) {
          map.panTo(found.marker.getPosition());
          map.setZoom(14);
          openCRLInfoWindow(found.marker, loc);
        }
        highlightCard(cardId);
      });
    } else {
      const typeName = result.type === 'labcorp' ? 'LabCorp' : 'Quest Diagnostics';
      const badge = result.type === 'labcorp' ? 'LC' : 'QD';
      const isStatic = !!result.staticData;
      const loc = isStatic ? result.staticData : null;
      const p = result.place || null;
      const name = isStatic ? loc.name : (p ? p.name : '');
      const addr = isStatic ? loc.addr : (p ? (p.vicinity || '') : '');
      const rating = isStatic ? (loc.rating || null) : (p ? (p.rating || null) : null);
      const cardId = isStatic ? (result.type + loc.lat + loc.lng) : (p ? p.place_id : Math.random());
      card.className = 'card';
      card.id = 'card-' + cardId;
      card.innerHTML = `
        <div class="card-badge ${result.type}">${badge}</div>
        <div class="card-info">
          <div class="card-name">${name}</div>
          <div class="card-addr">${addr}</div>
          <div class="card-meta">
            <span class="card-tag">${typeName}</span>
            ${rating ? `<span class="card-rating">★ ${rating.toFixed(1)}</span>` : ''}
            ${result.dist ? `<span class="card-dist">📍 ${result.dist.toFixed(1)} mi</span>` : ''}
          </div>
        </div>`;
      card.addEventListener('click', () => {
        if (isStatic) {
          const found = crlMarkersShown.find(m => m.loc && m.loc.lat === loc.lat && m.loc.lng === loc.lng);
          if (found) { map.panTo(found.marker.getPosition()); map.setZoom(14); openStaticInfoWindow(found.marker, loc, result.type); }
        } else if (p) {
          const marker = allMarkers.find(m => m.getTitle() === p.name);
          if (marker) { map.panTo(marker.getPosition()); map.setZoom(14); openInfoWindow(marker, result); }
        }
        highlightCard(cardId);
      });
    }
    list.appendChild(card);
  });
}

function highlightCard(placeId) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('card-' + placeId);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

// ── Filters ──
function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-all').className = 'filter-btn' + (f === 'all' ? ' active-all' : '');
  document.getElementById('btn-lc').className = 'filter-btn' + (f === 'labcorp' ? ' active-lc' : '');
  document.getElementById('btn-qd').className = 'filter-btn' + (f === 'quest' ? ' active-qd' : '');
  document.getElementById('btn-crl').className = 'filter-btn' + (f === 'crl' ? ' active-crl' : '');

  // Show/hide all static markers based on filter
  crlMarkersShown.forEach(({ marker, loc, type }) => {
    const markerType = type || (loc._type) || 'crl';
    const show = f === 'all' || f === markerType;
    marker.setMap(show ? map : null);
    marker.setOpacity(0.9);
  });
  clearMarkers();
  allResults = [];

  if (searchCenter) {
    showSearching(true);
    searchBothNetworks(searchCenter);
  }
}

function setRadius(r) {
  searchRadius = r;
  document.querySelectorAll('.radius-chip').forEach(c => c.classList.toggle('active', parseInt(c.dataset.r) === r));
  if (searchCenter) {
    drawRadiusCircle();
    clearMarkers();
    allResults = [];
    showSearching(true);
    searchBothNetworks(searchCenter);
  }
}

// ── Helpers ──
function clearMarkers() {
  allMarkers.forEach(m => m.setMap(null));
  allMarkers = [];
  if (infoWindow) infoWindow.close();
  // Reset CRL opacity
  crlMarkersShown.forEach(({ marker }) => marker.setOpacity(0.8));
}

function clearSearch() {
  clearMarkers();
  allResults = [];
  searchCenter = null;
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('radius-row').style.display = 'none';
  document.getElementById('loc-list').innerHTML = `<div class="no-results">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <strong>Search to find labs near you</strong>
    Enter any city, state, or ZIP — all 50 states + Puerto Rico supported.<br><br>
    <span style="font-size:.72rem;line-height:1.6">
      🔴 <b>LabCorp</b> &amp; 🔵 <b>Quest</b> load live from Google for any location.<br>
      🟣 <b>CRL Network</b> pins are pre-loaded where available.
    </span>
  </div>`;
  document.getElementById('loc-count').innerHTML = '0 <span>found</span>';
  if (radiusCircle) { radiusCircle.setMap(null); radiusCircle = null; }
  // Restore all static markers at full opacity
  crlMarkersShown.forEach(({ marker, type, loc }) => {
    const markerType = type || (loc._type) || 'crl';
    const show = currentFilter === 'all' || currentFilter === markerType;
    marker.setMap(show ? map : null);
    marker.setOpacity(0.9);
  });
  map.setCenter({ lat: 39.5, lng: -98.35 });
  map.setZoom(4);
}

function drawRadiusCircle() {
  if (radiusCircle) radiusCircle.setMap(null);
  radiusCircle = new google.maps.Circle({
    map,
    center: searchCenter,
    radius: searchRadius * 1609.34,
    fillColor: '#2d3a8c',
    fillOpacity: 0.04,
    strokeColor: '#2d3a8c',
    strokeOpacity: 0.25,
    strokeWeight: 1.5,
  });
}

function showSearching(v) {
  const el = document.getElementById('searching');
  if (el) el.classList.toggle('visible', v);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

window.initMap = initMap;

// Called if API key is invalid or billing not enabled
window.gm_authFailure = function() {
  showError(
    '🔑 API Key Error',
    'Your Google Maps API key was rejected. This usually means:<br><br>' +
    '<b>1.</b> Billing is not enabled on your Google Cloud project.<br>' +
    '<b>2.</b> The Maps JavaScript API is not enabled.<br>' +
    '<b>3.</b> The key has domain restrictions blocking this page.<br><br>' +
    'Fix: Go to <a href="https://console.cloud.google.com" target="_blank" style="color:#2d3a8c">console.cloud.google.com</a> → ' +
    'Billing → Enable billing, then APIs & Services → Enable Maps JavaScript API + Places API + Geocoding API.'
  );
};

// Called if the script itself fails to load (network error, wrong key format, etc.)
window.gm_loadError = function() {
  showError('🌐 Load Error', 'Could not load Google Maps. Check your internet connection.');
};

function showError(title, html) {
  document.getElementById('map').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:40px">' +
    '<div style="max-width:460px;background:#fff;border-radius:16px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.12);font-family:DM Sans,sans-serif;text-align:center">' +
    '<div style="font-size:2rem;margin-bottom:12px">' + title.split(' ')[0] + '</div>' +
    '<div style="font-size:1rem;font-weight:700;color:#1a1d23;margin-bottom:12px">' + title.split(' ').slice(1).join(' ') + '</div>' +
    '<div style="font-size:.85rem;color:#6b7280;line-height:1.7;text-align:left">' + html + '</div>' +
    '</div></div>';
  document.getElementById('search-input').placeholder = 'Map failed to load';
  document.getElementById('search-input').disabled = true;
}

// Timeout — if initMap never fires after 10 seconds, show helpful message
setTimeout(function() {
  if (!mapReady) {
    showError(
      '⏱ Map Timeout',
      'Google Maps did not load within 10 seconds. Possible causes:<br><br>' +
      '<b>1.</b> Billing not enabled on Google Cloud (most common).<br>' +
      '<b>2.</b> APIs not enabled — need Maps JavaScript API, Places API, Geocoding API.<br>' +
      '<b>3.</b> API key restrictions blocking this domain.<br><br>' +
      'Go to <a href="https://console.cloud.google.com/apis/dashboard" target="_blank" style="color:#2d3a8c">Google Cloud Console → APIs & Services</a> and verify all 3 APIs are enabled with billing active.'
    );
  }
}, 10000);
